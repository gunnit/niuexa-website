<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Matrice autonomia e controllo umano</title>
  <desc id="desc">Quattro livelli di controllo umano nei workflow AI, dall'assistenza alla zona non delegabile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0A1A26"/><stop offset="1" stop-color="#14324A"/></linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#237DA6"/><stop offset=".5" stop-color="#0E9C9A"/><stop offset="1" stop-color="#43AE68"/></linearGradient>
  </defs>
  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <rect x="44" y="44" width="1112" height="672" rx="24" fill="none" stroke="#237DA6" stroke-opacity=".35"/>
  <image href="../../niuexalogo.png" x="74" y="68" width="166" height="46"/>
  <text x="74" y="164" fill="#FFFFFF" font-family="Space Grotesk,Arial,sans-serif" font-size="42" font-weight="700">Matrice autonomia × controllo umano</text>
  <text x="74" y="202" fill="#B7C8D5" font-family="Hanken Grotesk,Arial,sans-serif" font-size="22">Il controllo cresce quando aumenta l'impatto e diminuisce la reversibilità.</text>
  <text x="90" y="288" fill="#B7C8D5" font-family="Hanken Grotesk,Arial,sans-serif" font-size="18" transform="rotate(-90 90 288)">IMPATTO DELL'ERRORE</text>
  <text x="520" y="690" fill="#B7C8D5" font-family="Hanken Grotesk,Arial,sans-serif" font-size="18">REVERSIBILITÀ DELL'AZIONE →</text>
  <rect x="136" y="250" width="450" height="180" rx="20" fill="#123F59" stroke="#237DA6"/>
  <text x="166" y="294" fill="#63C1E8" font-family="JetBrains Mono,monospace" font-size="17">LIVELLO 3</text>
  <text x="166" y="334" fill="#FFFFFF" font-family="Space Grotesk,Arial,sans-serif" font-size="30" font-weight="700">Approvazione preventiva</text>
  <text x="166" y="374" fill="#DCE7EE" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">L'AI prepara. Una persona approva</text>
  <text x="166" y="402" fill="#DCE7EE" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">prima dell'azione.</text>
  <rect x="614" y="250" width="450" height="180" rx="20" fill="#4B2930" stroke="#E27B68"/>
  <text x="644" y="294" fill="#FFB6A8" font-family="JetBrains Mono,monospace" font-size="17">LIVELLO 4</text>
  <text x="644" y="334" fill="#FFFFFF" font-family="Space Grotesk,Arial,sans-serif" font-size="30" font-weight="700">Zona non delegabile</text>
  <text x="644" y="374" fill="#F6E2DF" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">La decisione resta umana.</text>
  <text x="644" y="402" fill="#F6E2DF" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">L'AI supporta, non decide.</text>
  <rect x="136" y="458" width="450" height="180" rx="20" fill="#123F3E" stroke="#0E9C9A"/>
  <text x="166" y="502" fill="#65D2CF" font-family="JetBrains Mono,monospace" font-size="17">LIVELLO 1</text>
  <text x="166" y="542" fill="#FFFFFF" font-family="Space Grotesk,Arial,sans-serif" font-size="30" font-weight="700">Assistenza</text>
  <text x="166" y="582" fill="#DCE7EE" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">L'AI propone. La persona decide</text>
  <text x="166" y="610" fill="#DCE7EE" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">come usare l'output.</text>
  <rect x="614" y="458" width="450" height="180" rx="20" fill="#1D4934" stroke="#43AE68"/>
  <text x="644" y="502" fill="#86D9A1" font-family="JetBrains Mono,monospace" font-size="17">LIVELLO 2</text>
  <text x="644" y="542" fill="#FFFFFF" font-family="Space Grotesk,Arial,sans-serif" font-size="30" font-weight="700">Automazione sorvegliata</text>
  <text x="644" y="582" fill="#E0F2E5" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">L'AI esegue. Il team controlla</text>
  <text x="644" y="610" fill="#E0F2E5" font-family="Hanken Grotesk,Arial,sans-serif" font-size="20">campioni, soglie ed eccezioni.</text>
  <rect x="74" y="220" width="8" height="430" rx="4" fill="url(#brand)"/>
</svg>

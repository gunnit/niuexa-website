<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Framework Niuexa delle competenze AI operative</title>
  <desc id="desc">Quattro livelli collegati: processo, qualità, integrazione e controllo del risultato.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0A1A26"/><stop offset="1" stop-color="#14324A"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#237DA6"/><stop offset=".5" stop-color="#0E9C9A"/><stop offset="1" stop-color="#43AE68"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".25"/></filter>
  </defs>
  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="676" rx="24" fill="none" stroke="#237DA6" stroke-opacity=".28"/>
  <text x="72" y="104" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="36" font-weight="700">Dalla formazione alla capacità operativa</text>
  <text x="72" y="143" fill="#B8C8D4" font-family="Arial, sans-serif" font-size="20">Quattro competenze da collegare nello stesso workflow</text>
  <rect x="72" y="174" width="1056" height="6" rx="3" fill="url(#accent)"/>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(72 230)">
      <rect width="246" height="330" rx="22" fill="#FFFFFF"/>
      <circle cx="46" cy="48" r="24" fill="#237DA6"/><text x="46" y="57" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="700">1</text>
      <text x="28" y="108" fill="#14324A" font-size="25" font-weight="700">PROCESSO</text>
      <text x="28" y="151" fill="#54697A" font-size="18"><tspan x="28" dy="0">Scegliere un’attività</tspan><tspan x="28" dy="28">con owner, input,</tspan><tspan x="28" dy="28">output e confini chiari.</tspan></text>
      <rect x="28" y="257" width="190" height="44" rx="12" fill="#EAF4F8"/><text x="123" y="285" text-anchor="middle" fill="#1F64AE" font-size="16" font-weight="700">Unità di lavoro</text>
    </g>
    <g transform="translate(342 230)">
      <rect width="246" height="330" rx="22" fill="#FFFFFF"/>
      <circle cx="46" cy="48" r="24" fill="#0E9C9A"/><text x="46" y="57" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="700">2</text>
      <text x="28" y="108" fill="#14324A" font-size="25" font-weight="700">QUALITÀ</text>
      <text x="28" y="151" fill="#54697A" font-size="18"><tspan x="28" dy="0">Definire criteri,</tspan><tspan x="28" dy="28">soglie, eccezioni</tspan><tspan x="28" dy="28">e casi da rifiutare.</tspan></text>
      <rect x="28" y="257" width="190" height="44" rx="12" fill="#E7F6F5"/><text x="123" y="285" text-anchor="middle" fill="#0E7A78" font-size="16" font-weight="700">Criteri verificabili</text>
    </g>
    <g transform="translate(612 230)">
      <rect width="246" height="330" rx="22" fill="#FFFFFF"/>
      <circle cx="46" cy="48" r="24" fill="#2C8A4C"/><text x="46" y="57" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="700">3</text>
      <text x="28" y="108" fill="#14324A" font-size="25" font-weight="700">INTEGRAZIONE</text>
      <text x="28" y="151" fill="#54697A" font-size="18"><tspan x="28" dy="0">Inserire l’AI negli</tspan><tspan x="28" dy="28">strumenti, dati e</tspan><tspan x="28" dy="28">passaggi già usati.</tspan></text>
      <rect x="28" y="257" width="190" height="44" rx="12" fill="#ECF7EF"/><text x="123" y="285" text-anchor="middle" fill="#2C7A45" font-size="16" font-weight="700">Workflow reale</text>
    </g>
    <g transform="translate(882 230)">
      <rect width="246" height="330" rx="22" fill="#FFFFFF"/>
      <circle cx="46" cy="48" r="24" fill="#1F64AE"/><text x="46" y="57" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="700">4</text>
      <text x="28" y="108" fill="#14324A" font-size="25" font-weight="700">CONTROLLO</text>
      <text x="28" y="151" fill="#54697A" font-size="18"><tspan x="28" dy="0">Misurare risultato,</tspan><tspan x="28" dy="28">responsabilità, errori</tspan><tspan x="28" dy="28">ed escalation.</tspan></text>
      <rect x="28" y="257" width="190" height="44" rx="12" fill="#EAF0F8"/><text x="123" y="285" text-anchor="middle" fill="#1F64AE" font-size="16" font-weight="700">KPI + governance</text>
    </g>
  </g>
  <g stroke="#7FD1C1" stroke-width="5" fill="none" stroke-linecap="round"><path d="M318 395h24"/><path d="M588 395h24"/><path d="M858 395h24"/></g>
  <text x="72" y="638" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="700">Output atteso: un team capace di migliorare il lavoro, non solo di usare un tool.</text>
  <text x="72" y="681" fill="#B8C8D4" font-family="Arial, sans-serif" font-size="17">Framework operativo Niuexa — adattare ruoli e controlli all’impatto del processo.</text>
  <image href="../../niuexalogo.png" x="938" y="636" width="166" height="46" preserveAspectRatio="xMidYMid meet"/>
</svg>

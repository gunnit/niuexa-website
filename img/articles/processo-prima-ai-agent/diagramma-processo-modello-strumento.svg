<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="500" viewBox="0 0 1140 500" role="img" aria-labelledby="title desc">
<title id="title">Processo → Modello → Strumento</title><desc id="desc">Diagramma Niuexa sul framework AI agent orientato ai processi.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06121c"/><stop offset="1" stop-color="#0f2938"/></linearGradient>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e4556" stroke-width="0.7" opacity="0.5"/></pattern>
  <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#06B6D4"/></marker>
</defs>
<rect width="100%" height="100%" rx="28" fill="url(#bg)"/><rect width="100%" height="100%" rx="28" fill="url(#grid)"/>
<text x="40" y="54" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700" fill="#F6FBFF">Processo → Modello → Strumento</text>
<text x="40" y="82" font-family="JetBrains Mono, monospace" font-size="12" fill="#8fded8">NIUEXA · AI WORKFLOW FRAMEWORK</text>
<g filter="url(#shadow)"><rect x="70" y="145" width="260" height="120" rx="22" fill="#08202e" stroke="#237DA6" stroke-width="2"/><text x="200.0" y="187" text-anchor="middle" font-family="Space Grotesk, Arial" font-size="22" font-weight="700" fill="#F6FBFF">1 · PROCESSO</text><text x="200.0" y="217" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="14" fill="#c7e4e0">workflow, owner, KPI</text></g><line x1="335" y1="205" x2="435" y2="205" stroke="#06B6D4" stroke-width="4" marker-end="url(#arrow)"/><g filter="url(#shadow)"><rect x="440" y="145" width="260" height="120" rx="22" fill="#08202e" stroke="#0E9C9A" stroke-width="2"/><text x="570.0" y="187" text-anchor="middle" font-family="Space Grotesk, Arial" font-size="22" font-weight="700" fill="#F6FBFF">2 · MODELLO</text><text x="570.0" y="217" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="14" fill="#c7e4e0">capacità AI necessaria</text></g><line x1="705" y1="205" x2="805" y2="205" stroke="#06B6D4" stroke-width="4" marker-end="url(#arrow)"/><g filter="url(#shadow)"><rect x="810" y="145" width="260" height="120" rx="22" fill="#08202e" stroke="#43AE68" stroke-width="2"/><text x="940.0" y="187" text-anchor="middle" font-family="Space Grotesk, Arial" font-size="22" font-weight="700" fill="#F6FBFF">3 · STRUMENTO</text><text x="940.0" y="217" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="14" fill="#c7e4e0">piattaforma e integrazioni</text></g><rect x="130" y="330" width="880" height="95" rx="22" fill="#0A1A26" stroke="#2b6f83"/>
<text x="570" y="366" text-anchor="middle" font-family="Space Grotesk, Arial" font-size="21" font-weight="700" fill="#F6FBFF">Regola pratica</text>
<text x="570" y="397" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="18" fill="#c7e4e0">Se il processo è confuso, l'AI velocizza il disordine. Se il processo è chiaro, l'AI riduce attrito.</text>
</svg>
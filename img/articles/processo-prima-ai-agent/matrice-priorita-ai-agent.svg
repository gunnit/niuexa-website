<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="620" viewBox="0 0 1140 620" role="img" aria-labelledby="title desc">
<title id="title">Matrice di priorità per scegliere il primo AI agent</title><desc id="desc">Diagramma Niuexa sul framework AI agent orientato ai processi.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06121c"/><stop offset="1" stop-color="#0f2938"/></linearGradient>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e4556" stroke-width="0.7" opacity="0.5"/></pattern>
  <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#06B6D4"/></marker>
</defs>
<rect width="100%" height="100%" rx="28" fill="url(#bg)"/><rect width="100%" height="100%" rx="28" fill="url(#grid)"/>
<text x="40" y="54" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700" fill="#F6FBFF">Matrice di priorità per scegliere il primo AI agent</text>
<text x="40" y="82" font-family="JetBrains Mono, monospace" font-size="12" fill="#8fded8">NIUEXA · AI WORKFLOW FRAMEWORK</text>
<rect x="68" y="130" width="1004" height="420" rx="24" fill="#081d2a" stroke="#2b6f83"/>
<line x1="570" y1="160" x2="570" y2="520" stroke="#2b6f83" stroke-width="2"/><line x1="105" y1="340" x2="1040" y2="340" stroke="#2b6f83" stroke-width="2"/>
<text x="320" y="178" text-anchor="middle" font-family="Space Grotesk, Arial" font-size="20" font-weight="700" fill="#F6FBFF">Basso volume / poco ripetibile</text>
<text x="815" y="178" text-anchor="middle" font-family="Space Grotesk, Arial" font-size="20" font-weight="700" fill="#F6FBFF">Alto volume / ripetibile</text>
<text x="118" y="265" font-family="JetBrains Mono" font-size="14" fill="#8fded8">Dati sparsi</text>
<text x="118" y="455" font-family="JetBrains Mono" font-size="14" fill="#8fded8">Dati accessibili</text>
<text x="320" y="278" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="24" font-weight="700" fill="#fb7185">Prima chiarire</text>
<text x="815" y="278" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="24" font-weight="700" fill="#fbbf24">Buon candidato,<tspan x="815" dy="30">ma serve data cleanup</tspan></text>
<text x="320" y="458" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="24" font-weight="700" fill="#06B6D4">Automazione leggera</text>
<text x="815" y="458" text-anchor="middle" font-family="Hanken Grotesk, Arial" font-size="28" font-weight="700" fill="#43AE68">Primo AI agent</text>
